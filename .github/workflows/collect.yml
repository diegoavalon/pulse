name: Pulse Collect

on:
  schedule:
    # 07:00 America/Los_Angeles (handles PST/PDT via dual UTC triggers)
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      page_id:
        description: "Optional catalog page id from urls.json (blank = all pages)"
        required: false
        type: string
      run_id:
        description: "Optional run id override (YYYY-MM-DDTHH-MM-SS)"
        required: false
        type: string

concurrency:
  group: pulse-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    name: Collect raw artifacts (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: mobile
            throttle: 4g
            viewport: "390x844"
          - profile: desktop
            throttle: cable
            viewport: "1366x768"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enforce 07:00 America/Los_Angeles schedule
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          LA_HOUR="$(TZ='America/Los_Angeles' date +%H)"
          if [ "$LA_HOUR" != "07" ]; then
            echo "Skipping run: local LA hour is $LA_HOUR, not 07"
            exit 0
          fi

      - name: Collect sitespeed artifacts
        shell: bash
        env:
          PROFILE: ${{ matrix.profile }}
          THROTTLE: ${{ matrix.throttle }}
          VIEWPORT: ${{ matrix.viewport }}
          ITERATIONS: "3"
          PAGE_ID: ${{ github.event.inputs.page_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: |
          node scripts/collect-sitespeed.mjs

      - name: Upload raw sitespeed artifact
        uses: actions/upload-artifact@v4
        with:
          name: sitespeed-${{ matrix.profile }}
          path: artifacts/runs
          retention-days: 14

  consolidate:
    name: Consolidate and commit dashboard data
    runs-on: ubuntu-latest
    needs: collect
    permissions:
      contents: write
    outputs:
      commit_sha: ${{ steps.capture_commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npx --yes -p vite-plus@latest vp install

      - name: Build extractor package
        run: npx vp run extractor#build

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: collection-artifacts

      - name: Extract committed dashboard data from artifacts
        shell: bash
        run: |
          node scripts/consolidate-sitespeed.mjs collection-artifacts data

      - name: Validate generated data and app build
        shell: bash
        run: |
          npx vp check
          npx vp test
          npx vp run -r build

      - name: Commit consolidated data
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "No dashboard data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore(data): update committed sitespeed extraction output"
          git push

      - name: Capture commit SHA for deploy
        id: capture_commit
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Workflow contract checks
        shell: bash
        run: |
          npx vp test packages/extractor/tests/collect-workflow-contract.test.ts

  deploy:
    name: Build and deploy dashboard to Pages
    runs-on: ubuntu-latest
    needs: consolidate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout consolidated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.consolidate.outputs.commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npx --yes -p vite-plus@latest vp install

      - name: Build static dashboard
        run: npx vp run frontend#build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
